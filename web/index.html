<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Samoa Village – Benessere e prenotazioni">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Samoa Village">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Theme -->
  <meta name="theme-color" content="#0a1628">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Samoa Village</title>
  <link rel="manifest" href="manifest.json">

  <style>
    #pwa-install-banner {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 9999;
      background-color: #0a1628;
      color: #ffffff;
      padding: 16px 20px;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.4);
      font-family: sans-serif;
    }
    #pwa-install-banner.visible {
      display: flex;
    }
    #pwa-install-banner .banner-text {
      flex: 1;
    }
    #pwa-install-banner .banner-title {
      font-weight: 700;
      font-size: 15px;
      color: #ffffff;
    }
    #pwa-install-banner .banner-sub {
      font-size: 12px;
      color: #a0b4cc;
      margin-top: 2px;
    }
    #pwa-install-banner .banner-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-shrink: 0;
    }
    #pwa-install-btn {
      background-color: #ffffff;
      color: #0a1628;
      font-weight: 700;
      font-size: 14px;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      cursor: pointer;
      white-space: nowrap;
    }
    #pwa-dismiss-btn {
      background: none;
      border: none;
      color: #a0b4cc;
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
      padding: 4px;
    }

    #whatsapp-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9998;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background-color: #25D366;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.35);
      text-decoration: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    #whatsapp-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 6px 20px rgba(0,0,0,0.45);
    }
    #whatsapp-btn svg {
      width: 30px;
      height: 30px;
      fill: #ffffff;
    }
  </style>
</head>
<body>
  <!-- WhatsApp Button -->
  <a id="whatsapp-btn" href="https://wa.me/393406605782" target="_blank" rel="noopener" aria-label="Contattaci su WhatsApp">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
    </svg>
  </a>

  <!-- PWA Install Banner -->
  <div id="pwa-install-banner">
    <div class="banner-text">
      <div class="banner-title">Installa Samoa Village</div>
      <div class="banner-sub">Aggiungila alla schermata home per accedervi offline</div>
    </div>
    <div class="banner-actions">
      <button id="pwa-install-btn">Installa</button>
      <button id="pwa-dismiss-btn" aria-label="Chiudi">&#x2715;</button>
    </div>
  </div>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    let deferredPrompt = null;
    const banner = document.getElementById('pwa-install-banner');
    const installBtn = document.getElementById('pwa-install-btn');
    const dismissBtn = document.getElementById('pwa-dismiss-btn');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      if (!sessionStorage.getItem('pwa-dismissed')) {
        banner.classList.add('visible');
      }
    });

    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      banner.classList.remove('visible');
    });

    dismissBtn.addEventListener('click', () => {
      banner.classList.remove('visible');
      sessionStorage.setItem('pwa-dismissed', '1');
    });

    window.addEventListener('appinstalled', () => {
      banner.classList.remove('visible');
      deferredPrompt = null;
    });
  </script>
</body>
</html>
